<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>SAT TRACKER</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#010810; overflow:hidden; font-family:'Share Tech Mono',monospace; color:#00d4ff; }
  canvas { position:fixed; inset:0; }
  #ui { position:fixed; inset:0; pointer-events:none; z-index:10; }
  .panel {
    position:absolute; background:rgba(0,18,36,0.88); border:1px solid #00d4ff;
    border-left:3px solid #00d4ff; padding:12px 16px; backdrop-filter:blur(6px);
    pointer-events:all;
  }
  .panel h1 { font-family:'Orbitron',monospace; font-size:10px; letter-spacing:4px; margin-bottom:10px; text-shadow:0 0 10px #00d4ff; }
  .row { display:flex; justify-content:space-between; font-size:10px; padding:2px 0; border-bottom:1px solid rgba(0,212,255,0.1); }
  .row:last-child { border:none; }
  .lbl { color:rgba(0,212,255,0.5); }
  .val { color:#fff; }
  .val a { color:inherit; text-decoration:none; }
  .val a:hover { color:#ff6b35; }
  #panel-tl { top:20px; left:20px; width:220px; }
  #panel-tr { top:20px; right:20px; width:180px; pointer-events:all; }
  .btn { display:block; width:100%; margin-top:6px; background:rgba(0,18,36,0.9); border:1px solid rgba(0,212,255,0.3); color:#00d4ff; font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:1px; padding:5px 8px; cursor:pointer; }
  .btn:hover { border-color:#00d4ff; box-shadow:0 0 8px rgba(0,212,255,0.3); }
  #legend { position:absolute; bottom:20px; left:20px; font-size:10px; line-height:2; }
  .li { display:flex; align-items:center; gap:8px; color:rgba(0,212,255,0.5); }
  .dot { width:7px; height:7px; border-radius:50%; }
  #tip { position:fixed; z-index:20; background:rgba(0,18,36,0.95); border:1px solid #ff6b35; padding:5px 9px; font-size:10px; pointer-events:none; display:none; color:#fff; }
  body::after { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px); pointer-events:none; z-index:50; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div class="panel" id="panel-tl">
    <h1>◈ SAT TRACKER</h1>
    <div class="row"><span class="lbl">SATELLITI</span><span class="val" id="s-tot">—</span></div>
    <div class="row"><span class="lbl">VISIBILI</span><span class="val" id="s-vis">—</span></div>
    <div class="row"><span class="lbl">UTC</span><span class="val" id="s-utc" style="color:#ff6b35">—</span></div>
    <div class="row"><span class="lbl">FONTE</span><span class="val" style="font-size:9px">CELESTRAK.ORG</span></div>
    <div class="row"><span class="lbl" title="Info satelliti">INFO</span><span class="val" style="font-size:9px"><a href="https://celestrak.org/NORAD/elements/" target="_blank" rel="noopener">celestrak.org</a></span></div>
    <div class="row"><span class="lbl" title="API (JSON)">API</span><span class="val" style="font-size:9px"><a href="https://celestrak.org/NORAD/elements/gp.php?GROUP=active&FORMAT=json" target="_blank" rel="noopener">json</a></span></div>
  </div>
  <div class="panel" id="panel-tr">
    <button class="btn" id="btn-rot">⟳ ROTAZIONE: ON</button>
    <button class="btn" id="btn-orb">◎ ORBITE: OFF</button>
    <button class="btn" id="btn-zi">+ ZOOM IN</button>
    <button class="btn" id="btn-zo">− ZOOM OUT</button>
  </div>
  <div id="legend">
    <div class="li"><div class="dot" style="background:#39ff14"></div>LEO &lt; 2000 km</div>
    <div class="li"><div class="dot" style="background:#00d4ff"></div>MEO 2000–35786 km</div>
    <div class="li"><div class="dot" style="background:#ff6b35"></div>GEO ≈ 35786 km</div>
    <div class="li"><div class="dot" style="background:#c084fc"></div>HEO / ALTRO</div>
  </div>
</div>
<div id="tip"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy, R;
let sats = [], rot = 0, zoom = 1;
let autoRot = true, showOrb = false;
let mx = 0, my = 0, hov = null;
let dragging = false, dragX = 0, rotStart = 0;

function resize() {
  W = canvas.width  = innerWidth;
  H = canvas.height = innerHeight;
  cx = W/2; cy = H/2;
  R = Math.min(W,H) * 0.18;
}
window.addEventListener('resize', resize);
resize();

// ── orbital mechanics ────────────────────────────────────────────
function satPos(s) {
  const inc  = s.INCLINATION * Math.PI/180;
  const raan = (s.RA_OF_ASC_NODE||0) * Math.PI/180;
  const aop  = (s.ARG_OF_PERICENTER||0) * Math.PI/180;
  const ecc  = s.ECCENTRICITY||0;
  const ma0  = (s.MEAN_ANOMALY||0) * Math.PI/180;
  const n    = s.MEAN_MOTION * 2*Math.PI/86400;
  const dt   = (Date.now()/1000 - new Date(s.EPOCH).getTime()/1000);
  const ma   = ma0 + n*dt;
  let E = ma;
  for(let i=0;i<5;i++) E = ma + ecc*Math.sin(E);
  const nu = 2*Math.atan2(Math.sqrt(1+ecc)*Math.sin(E/2), Math.sqrt(1-ecc)*Math.cos(E/2));
  const a  = Math.cbrt(398600.4418/(n*n));
  const r  = a*(1 - ecc*Math.cos(E));
  const xo = r*Math.cos(nu), yo = r*Math.sin(nu);
  const cO=Math.cos(raan),sO=Math.sin(raan),cw=Math.cos(aop),sw=Math.sin(aop),ci=Math.cos(inc),si=Math.sin(inc);
  return {
    x: (cO*cw - sO*sw*ci)*xo + (-cO*sw - sO*cw*ci)*yo,
    y: (sO*cw + cO*sw*ci)*xo + (-sO*sw + cO*cw*ci)*yo,
    z: sw*si*xo + cw*si*yo,
    alt: r - 6371
  };
}

function project(x,y,z) {
  const c=Math.cos(rot), s=Math.sin(rot);
  const rx = x*c - y*s, ry = x*s + y*c;
  const sc = R*zoom/6371;
  return { px: cx+rx*sc, py: cy-z*sc, depth: ry, vis: ry>=0 };
}

function satColor(alt) {
  if(alt<2000)  return '#39ff14';
  if(alt<35000) return '#00d4ff';
  if(alt<40000) return '#ff6b35';
  return '#c084fc';
}

// ── draw ─────────────────────────────────────────────────────────
function drawEarth() {
  const r = R*zoom;
  // Atmosphere
  const atm = ctx.createRadialGradient(cx,cy,r*.95,cx,cy,r*1.15);
  atm.addColorStop(0,'rgba(0,100,255,0.15)');
  atm.addColorStop(1,'rgba(0,50,255,0)');
  ctx.beginPath(); ctx.arc(cx,cy,r*1.15,0,Math.PI*2);
  ctx.fillStyle=atm; ctx.fill();
  // Body
  const g = ctx.createRadialGradient(cx-r*.3,cy-r*.3,r*.1,cx,cy,r);
  g.addColorStop(0,'#1a4a8a'); g.addColorStop(.5,'#0d3060'); g.addColorStop(1,'#020d1f');
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle=g; ctx.fill();
  // Grid
  ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
  ctx.strokeStyle='rgba(0,150,255,0.1)'; ctx.lineWidth=.5;
  for(let lat=-75;lat<=75;lat+=15) {
    const lr=Math.cos(lat*Math.PI/180)*r, ly=cy-Math.sin(lat*Math.PI/180)*r;
    ctx.beginPath(); ctx.ellipse(cx,ly,lr,lr*.1,0,0,Math.PI*2); ctx.stroke();
  }
  for(let lon=0;lon<360;lon+=20) {
    const a=(lon+rot*180/Math.PI)*Math.PI/180;
    ctx.beginPath(); ctx.ellipse(cx,cy,r*Math.abs(Math.cos(a)),r,0,0,Math.PI*2); ctx.stroke();
  }
  // Equator
  ctx.strokeStyle='rgba(255,50,50,0.7)'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.ellipse(cx,cy,r,r*.08,0,0,Math.PI*2); ctx.stroke();
  ctx.restore();
  // Rim
  const rim=ctx.createRadialGradient(cx,cy,r*.9,cx,cy,r);
  rim.addColorStop(0,'rgba(0,80,255,0)'); rim.addColorStop(1,'rgba(0,150,255,0.3)');
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle=rim; ctx.fill();
}

function drawSats() {
  if(!sats.length) return 0;
  const pts = [];
  sats.forEach((s,i) => {
    try { const p=satPos(s); pts.push({s,i,...project(p.x,p.y,p.z),alt:p.alt}); } catch(e){}
  });
  pts.sort((a,b)=>a.depth-b.depth);

  if(showOrb) pts.forEach(({alt,vis})=>{
    if(!vis) return;
    const r=R*zoom*(1+alt/6371);
    ctx.beginPath(); ctx.ellipse(cx,cy,r,r*.12,0,0,Math.PI*2);
    ctx.strokeStyle=satColor(alt)+'22'; ctx.lineWidth=.5; ctx.stroke();
  });

  let vis=0, newHov=null;
  pts.forEach(({s,i,px,py,vis:v,alt})=>{
    if(!v) return; vis++;
    const col=satColor(alt), dr=alt<2000?1.5:alt<35000?2:2.5;
    const near=Math.hypot(px-mx,py-my)<8;
    if(near) newHov=i;
    if(near) {
      ctx.beginPath(); ctx.arc(px,py,dr*4,0,Math.PI*2);
      const g=ctx.createRadialGradient(px,py,0,px,py,dr*4);
      g.addColorStop(0,col+'88'); g.addColorStop(1,col+'00');
      ctx.fillStyle=g; ctx.fill();
    }
    ctx.beginPath(); ctx.arc(px,py,near?dr*2:dr,0,Math.PI*2);
    ctx.fillStyle=near?'#fff':col; ctx.fill();
  });
  hov=newHov; return vis;
}

let last=0;
function loop(ts) {
  const dt=Math.min((ts-last)/1000,.1); last=ts;
  if(autoRot) rot+=dt*.1;
  ctx.clearRect(0,0,W,H);
  drawEarth();
  const vis=drawSats();
  // UTC clock
  const n=new Date();
  document.getElementById('s-utc').textContent=
    [n.getUTCHours(),n.getUTCMinutes(),n.getUTCSeconds()].map(x=>String(x).padStart(2,'0')).join(':');
  document.getElementById('s-vis').textContent=vis||'—';
  // Tooltip
  const tip=document.getElementById('tip');
  if(hov!==null && sats[hov]) {
    tip.style.display='block';
    tip.style.left=(mx+14)+'px'; tip.style.top=(my-8)+'px';
    tip.textContent=sats[hov].OBJECT_NAME||`SAT #${hov}`;
  } else tip.style.display='none';
  requestAnimationFrame(loop);
}

// ── controls ─────────────────────────────────────────────────────
canvas.addEventListener('mousemove',e=>{ mx=e.clientX; my=e.clientY; if(dragging) rot=rotStart+(e.clientX-dragX)*.005; });
canvas.addEventListener('mousedown',e=>{ dragging=true; dragX=e.clientX; rotStart=rot; });
canvas.addEventListener('mouseup',  ()=>dragging=false);
canvas.addEventListener('mouseleave',()=>dragging=false);
canvas.addEventListener('wheel',e=>{ e.preventDefault(); zoom=Math.max(.4,Math.min(4,zoom*(e.deltaY<0?1.1:0.91))); },{passive:false});

document.getElementById('btn-rot').addEventListener('click',()=>{ autoRot=!autoRot; document.getElementById('btn-rot').textContent=`⟳ ROTAZIONE: ${autoRot?'ON':'OFF'}`; });
document.getElementById('btn-orb').addEventListener('click',()=>{ showOrb=!showOrb; document.getElementById('btn-orb').textContent=`◎ ORBITE: ${showOrb?'ON':'OFF'}`; });
document.getElementById('btn-zi').addEventListener('click',()=>zoom=Math.min(zoom*1.3,4));
document.getElementById('btn-zo').addEventListener('click',()=>zoom=Math.max(zoom/1.3,.4));

// ── fetch data ───────────────────────────────────────────────────
async function fetchSats() {
  try {
    const url='https://api.allorigins.win/raw?url='+encodeURIComponent('https://celestrak.org/NORAD/elements/gp.php?GROUP=active&FORMAT=json');
    const data=await fetch(url).then(r=>r.json());
    const step=Math.max(1,Math.floor(data.length/1500));
    sats=data.filter((_,i)=>i%step===0);
    document.getElementById('s-tot').textContent=data.length.toLocaleString('it-IT');
  } catch(e) {
    // Demo fallback
    sats=[];
    const groups=[
      {name:'STARLINK',n:500,aMin:500,aMax:600,inc:53},
      {name:'GPS',n:31,a:20200,inc:55},
      {name:'GLONASS',n:24,a:19100,inc:64.8},
      {name:'GEO',n:80,a:35786,inc:.5},
      {name:'LEO',n:800,aMin:300,aMax:1500,inc:null}
    ];
    groups.forEach(g=>{ for(let i=0;i<g.n;i++) {
      const alt=g.a||(g.aMin+Math.random()*(g.aMax-g.aMin));
      const a=6371+alt, nm=Math.sqrt(398600.4418/(a*a*a))*86400/(2*Math.PI);
      sats.push({ OBJECT_NAME:`${g.name}-${i+1}`, NORAD_CAT_ID:25000+sats.length,
        INCLINATION:g.inc??Math.random()*130, RA_OF_ASC_NODE:Math.random()*360,
        ECCENTRICITY:.0001+Math.random()*.01, ARG_OF_PERICENTER:Math.random()*360,
        MEAN_ANOMALY:Math.random()*360, MEAN_MOTION:nm,
        EPOCH:new Date(Date.now()-Math.random()*7*86400000).toISOString() });
    }});
    document.getElementById('s-tot').textContent='~8000 (DEMO)';
  }
}

requestAnimationFrame(ts=>{last=ts;loop(ts);});
fetchSats();
</script>
</body>
</html>
