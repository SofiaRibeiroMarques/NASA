<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>ISS TRACKER</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; }
  #hud {
    position:fixed; top:0; left:0; width:100%; height:100%;
    pointer-events:none; z-index:10;
    font-family:'Share Tech Mono', monospace;
  }
  .panel {
    position:absolute; border:1px solid rgba(0,255,180,.25);
    background:rgba(0,8,20,.75); backdrop-filter:blur(6px);
    padding:14px 18px; color:#b0ffe8;
  }
  .panel-tl { top:22px; left:22px; width:230px; }
  .panel-tr { top:22px; right:22px; width:220px; text-align:right; }
  .panel-bl { bottom:22px; left:22px; width:230px; }
  .label { font-size:9px; letter-spacing:.2em; color:#00ffc8; opacity:.6; margin-bottom:3px; text-transform:uppercase; }
  .value { font-size:15px; color:#fff; line-height:1.5; }
  .value.big { font-family:'Orbitron',sans-serif; font-size:13px; color:#00ffc8; }
  .sep { border:none; border-top:1px solid rgba(0,255,180,.18); margin:10px 0; }
  .dot { display:inline-block; width:7px; height:7px; border-radius:50%;
    background:#00ffc8; box-shadow:0 0 8px #00ffc8; margin-right:6px; animation:blink 1.2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
  .crew-name { font-size:11px; color:#cde; padding:2px 0; }
  .hint { font-size:9px; color:rgba(0,255,180,.35); letter-spacing:.15em; text-align:center; margin-top:8px; }
  #title {
    position:absolute; top:22px; left:50%; transform:translateX(-50%);
    font-family:'Orbitron',sans-serif; font-size:12px; letter-spacing:.35em;
    color:#00ffc8; text-shadow:0 0 20px #00ffc8aa; white-space:nowrap;
  }
  #scanline {
    position:fixed; top:0; left:0; width:100%; height:100%;
    pointer-events:none; z-index:20;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);
  }
</style>
</head>
<body>
<div id="scanline"></div>
<div id="hud">
  <div id="title"><span class="dot"></span>ISS LIVE TRACKER</div>

  <div class="panel panel-tl">
    <div class="label">Posizione Attuale</div>
    <div class="value big" id="lat">---.----° -</div>
    <div class="value big" id="lon">---.----° -</div>
    <hr class="sep">
    <div class="label">Regione</div>
    <div class="value" id="region" style="font-size:12px;color:#ffd080">—</div>
    <hr class="sep">
    <div class="label">Dati Orbitali</div>
    <div class="value" style="font-size:12px">ALT&nbsp;&nbsp;~408 km</div>
    <div class="value" style="font-size:12px">VEL&nbsp;&nbsp;~7.66 km/s</div>
    <div class="value" style="font-size:12px">INC&nbsp;&nbsp;51.6°</div>
  </div>

  <div class="panel panel-tr">
    <div class="label">Ora UTC</div>
    <div class="value big" id="clock">--:--:--</div>
    <hr class="sep">
    <div class="label">Aggiornamento</div>
    <div class="value" id="refresh" style="font-size:11px">—</div>
    <hr class="sep">
    <div class="label">Fonte dati</div>
    <div class="value" style="font-size:10px;color:#7af">open-notify.org</div>
  </div>

  <div class="panel panel-bl">
    <div class="label">Equipaggio ISS (<span id="crew-count">0</span>)</div>
    <div id="crew-list"></div>
    <div class="hint">↖ trascina per ruotare · scroll zoom</div>
  </div>
</div>

<script>
let lat=0, lon=0, astros=[], stars=[];
let rotX=0.3, rotY=0, zoom=1;
let dragging=false, lastMX=0, lastMY=0;
let trail=[], pulse=0, earthRot=0;
let earthTex, cloudTex;

function preload(){
  earthTex = loadImage("https://i.imgur.com/1v5fLgV.jpg", ()=>{}, ()=>{});
  cloudTex = loadImage("https://i.imgur.com/s2z9zJg.jpg", ()=>{}, ()=>{});
}

function setup(){
  createCanvas(windowWidth, windowHeight, WEBGL);
  textFont("monospace");
  for(let i=0;i<800;i++) stars.push({
    x:random(-width*2, width*2), y:random(-height*2, height*2),
    b:random(80,255), s:random(.5,2.5)
  });
  fetchCrew();
  fetchISS();
  setInterval(updateClock, 1000);
}

function windowResized(){ resizeCanvas(windowWidth, windowHeight); }
function mousePressed(){ dragging=true; lastMX=mouseX; lastMY=mouseY; }
function mouseReleased(){ dragging=false; }
function mouseDragged(){
  if(!dragging) return;
  rotY += (mouseX-lastMX)*.007;
  rotX += (mouseY-lastMY)*.007;
  rotX = constrain(rotX, -HALF_PI, HALF_PI);
  lastMX=mouseX; lastMY=mouseY;
}
function mouseWheel(e){ zoom = constrain(zoom - e.delta*.001, .4, 2.5); return false; }

function draw(){
  background(0,4,14);
  pulse = (sin(frameCount*.06)+1)/2;

  // Stelle 2D background
  push(); resetMatrix(); noStroke();
  for(let s of stars){ fill(s.b); rect(s.x, s.y, s.s, s.s); }
  pop();

  if(!dragging) rotY += .0018;
  scale(zoom);
  rotateX(rotX);
  rotateY(rotY);

  // Luci
  directionalLight(255,240,200,-1,.4,-.7);
  ambientLight(20,28,40);

  // === TERRA ===
  push();
  earthRot += .0004; rotateY(earthRot);
  push(); noStroke(); if(earthTex) texture(earthTex); sphere(200,64,48); pop();
  push(); noStroke(); if(cloudTex){ texture(cloudTex); blendMode(ADD); } sphere(203,64,48); blendMode(BLEND); pop();
  push(); noLights();
    fill(30,100,255,20); sphere(212);
    fill(20,70,180,9);   sphere(228);
  pop();
  pop();

  // Anello orbita
  push(); noFill(); noLights();
  stroke(0,255,200,22); strokeWeight(1);
  rotateX(radians(51.6)); ellipse(0,0,450,450);
  pop();

  // Coordinate ISS → 3D
  const R=228;
  const ix = R*cos(radians(lat))*cos(radians(lon));
  const iy = -R*sin(radians(lat));
  const iz = R*cos(radians(lat))*sin(radians(lon));

  trail.push({x:ix,y:iy,z:iz});
  if(trail.length>90) trail.shift();

  // Scia
  push(); noFill(); noLights();
  for(let i=1;i<trail.length;i++){
    let a=map(i,0,trail.length,0,140);
    stroke(0,255,180,a); strokeWeight(1.8);
    let t=trail[i],p=trail[i-1];
    line(p.x,p.y,p.z,t.x,t.y,t.z);
  }
  pop();

  // Linea nadir
  const f=200/R;
  push(); noLights(); stroke(0,255,180,40); strokeWeight(.7);
  line(ix*f,iy*f,iz*f, ix,iy,iz);
  pop();

  // Punto nadir su Terra
  push(); translate(ix*f,iy*f,iz*f); noStroke(); noLights();
  fill(0,255,180,40+pulse*70); sphere(7+pulse*3);
  fill(220,255,240); sphere(2.5);
  pop();

  // Marker ISS
  push(); translate(ix,iy,iz); noStroke(); noLights();
  fill(0,255,180,18+pulse*35); sphere(20+pulse*8);
  fill(0,255,180,70+pulse*55); sphere(11);
  fill(255,240,80);             sphere(5);
  // Pannelli solari stilizzati
  stroke(80,160,255,180); strokeWeight(2); noFill();
  line(-14,0,0, 14,0,0);
  line(-14,-1,0,-14,1,0);
  line(14,-1,0,  14,1,0);
  pop();
}

// === DATA ===
async function fetchISS(){
  try {
    // Utilizziamo un proxy CORS per aggirare le restrizioni
    const url = "https://api.wheretheiss.at/v1/satellites/25544";
    const d = await fetch(url).then(r=>r.json());
    lat = parseFloat(d.latitude);
    lon = parseFloat(d.longitude);
    updateHUD();
    fetchGeo();
  } catch(e) {
    console.warn("ISS fetch fallback", e);
  }
  setTimeout(fetchISS, 5000);
}

async function fetchGeo(){
  try {
    const g = await fetch(
      `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=it`
    ).then(r=>r.json());
    document.getElementById("region").textContent =
      g.countryName || g.locality || "Oceano / Int'l Waters";
  } catch(e) {}
}

async function fetchCrew(){
  try {
    // open-notify astronauts
    const d = await fetch("https://api.open-notify.org/astros.json").then(r=>r.json());
    astros = d.people || [];
    document.getElementById("crew-count").textContent = astros.length;
    const list = document.getElementById("crew-list");
    list.innerHTML = astros.map(p=>`<div class="crew-name">· ${p.name}</div>`).join("");
  } catch(e) {}
}

function updateHUD(){
  const latDir = lat>=0?"N":"S", lonDir = lon>=0?"E":"W";
  document.getElementById("lat").textContent = abs(lat).toFixed(4)+"° "+latDir;
  document.getElementById("lon").textContent = abs(lon).toFixed(4)+"° "+lonDir;
  document.getElementById("refresh").textContent = "ogni 5s · "+new Date().toLocaleTimeString("it-IT");
}

function updateClock(){
  const now=new Date();
  document.getElementById("clock").textContent =
    now.getUTCHours().toString().padStart(2,"0")+":"+
    now.getUTCMinutes().toString().padStart(2,"0")+":"+
    now.getUTCSeconds().toString().padStart(2,"0");
}
updateClock();
</script>
</body>
</html>
