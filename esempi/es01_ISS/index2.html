// ── MOUSE INTERACTION ────────────────────────────────────────────
let isDragging=false, prevMX=0, prevMY=0;
let rotX=0.3, rotY=0;

function handleDragStart(x, y) {
  isDragging = true;
  prevMX = x;
  prevMY = y;
}

function handleDragEnd() {
  isDragging = false;
}

function handleDrag(x, y) {
  if (!isDragging) return;
  rotY += (x - prevMX) * 0.007;
  rotX += (y - prevMY) * 0.007;
  rotX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, rotX));
  prevMX = x;
  prevMY = y;
}

renderer.domElement.addEventListener('mousedown', e => handleDragStart(e.clientX, e.clientY));
renderer.domElement.addEventListener('mouseup', handleDragEnd);
renderer.domElement.addEventListener('mouseleave', handleDragEnd);
renderer.domElement.addEventListener('mousemove', e => handleDrag(e.clientX, e.clientY));

renderer.domElement.addEventListener('touchstart', e => handleDragStart(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
renderer.domElement.addEventListener('touchend', handleDragEnd, { passive: true });
renderer.domElement.addEventListener('touchmove', e => handleDrag(e.touches[0].clientX, e.touches[0].clientY), { passive: true });

renderer.domElement.addEventListener('wheel', e=>{
  camera.position.z = Math.max(250, Math.min(1200, camera.position.z + e.deltaY*0.5));
}, {passive:true});

// ── ISS DATA ─────────────────────────────────────────────────────
let lat=0, lon=0;

function issTo3D(la, lo, r) {
  const phi   = THREE.MathUtils.degToRad(la);
  const theta = THREE.MathUtils.degToRad(lo);
  return new THREE.Vector3(
    r * Math.cos(phi) * Math.cos(theta),
   -r * Math.sin(phi),
    r * Math.cos(phi) * Math.sin(theta)
  );
}

async function fetchISS(){
  try {
    const d = await fetch("https://api.wheretheiss.at/v1/satellites/25544").then(r=>r.json());
    lat = parseFloat(d.latitude);
    lon = parseFloat(d.longitude);
    updateHUD();
    fetchGeo();
  } catch(e){ console.warn(e); }
  setTimeout(fetchISS, 5000);
}

async function fetchGeo(){
  try {
    const g = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=it`).then(r=>r.json());
    document.getElementById("region").textContent = g.countryName || g.locality || "Oceano / Int'l Waters";
  } catch(e){}
}

async function fetchCrew(){
  try {
    const d = await fetch("https://api.open-notify.org/astros.json").then(r=>r.json());
    const people = d.people||[];
    document.getElementById("crew-count").textContent = people.length;
    document.getElementById("crew-list").innerHTML = people.map(p=>`<div class="crew-name">· ${p.name}</div>`).join("");
  } catch(e){}
}

function updateHUD(){
  const ld=lat>=0?"N":"S", lo=lon>=0?"E":"W";
  document.getElementById("lat").textContent = Math.abs(lat).toFixed(4)+"° "+ld;
  document.getElementById("lon").textContent = Math.abs(lon).toFixed(4)+"° "+lo;
  document.getElementById("refresh").textContent = "ogni 5s · "+new Date().toLocaleTimeString("it-IT");
}

function updateClock(){
  const n=new Date();
  document.getElementById("clock").textContent =
    n.getUTCHours().toString().padStart(2,"0")+":"+
    n.getUTCMinutes().toString().padStart(2,"0")+":"+
    n.getUTCSeconds().toString().padStart(2,"0");
}
setInterval(updateClock,1000); updateClock();
fetchISS(); fetchCrew();

// ── ANIMATE ──────────────────────────────────────────────────────
let earthRotY = 0;
const clock = new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const pulse = (Math.sin(t*3)+1)/2;

  // Earth auto-rotate
  earthRotY += 0.0004;
  earthMesh.rotation.y = earthRotY;
  eqLine.rotation.y    = earthRotY; // equatore ruota con terra

  // Pivot rotation (user drag)
  if(!isDragging) rotY += 0.0018;
  pivot.rotation.x = rotX;
  pivot.rotation.y = rotY;

  // ISS position
  const issPos   = issTo3D(lat, lon, 228);
  const nadirPos3 = issTo3D(lat, lon, 200);

  issGroup.position.copy(issPos);
  issGlow.material.opacity  = 0.35 + pulse*0.3;
  issHalo.material.opacity  = 0.08 + pulse*0.12;

  nadirGroup.position.copy(nadirPos3);
  nadirGlow.material.opacity = 0.2 + pulse*0.35;

  // Nadir line
  const np = nadirLine.geometry.attributes.position;
  np.setXYZ(0, nadirPos3.x, nadirPos3.y, nadirPos3.z);
  np.setXYZ(1, issPos.x,    issPos.y,    issPos.z);
  np.needsUpdate = true;

  // Trail
  trailBuf.push(issPos.clone());
  if(trailBuf.length > TRAIL_LEN) trailBuf.shift();

  const tp = trailLine.geometry.attributes.position;
  const fillPos = trailBuf[0] || issPos; // Punto con cui riempire il resto del buffer
  for(let i=0;i<TRAIL_LEN;i++){
    const p = trailBuf[i] || fillPos;
    tp.setXYZ(i, p.x, p.y, p.z);
  }
  tp.needsUpdate = true;
  trailLine.geometry.setDrawRange(0, trailBuf.length);

  renderer.render(scene, camera);
}
animate();
</script>
